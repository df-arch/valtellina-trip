<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sondrio / Valtellina Trip</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#f6f7f9; color:#1c1e21; }
.wrap { max-width:760px; margin:0 auto; padding:28px 20px 60px; }
h1 { font-size:26px; margin:0 0 4px; letter-spacing:-0.02em; }
.sub { color:#6b7280; font-size:14px; }
.meta { color:#6b7280; font-size:13px; margin-top:6px; }
.card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:16px; }
.date { flex:0 0 auto; width:66px; text-align:center; border-right:1px solid #eef0f2; padding-right:14px; }
.dow { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#9aa0a6; }
.dnum { font-size:22px; font-weight:700; line-height:1; margin:2px 0; }
.mon { font-size:12px; color:#6b7280; }
.act { font-size:16px; font-weight:500; }
.act.empty { color:#b3b9c0; font-weight:400; font-style:italic; }
.tag { display:inline-block; margin-left:8px; font-size:11px; font-weight:600; padding:2px 8px; border-radius:999px; vertical-align:middle; }
.t-travel { background:#eaf2ff; color:#2563eb; }
.t-rest { background:#eafaf0; color:#16a34a; }
.t-out { background:#fff4e5; color:#d97706; }
.wk { margin:22px 0 8px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#9aa0a6; }
footer { margin-top:28px; color:#9aa0a6; font-size:12px; text-align:center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏔️ Sondrio / Valtellina Trip</h1>
    <div class="sub">A getaway in Valtellina · 29 Aug – 12 Sep 2026</div>
    <div class="meta">15 days · Sondrio, Lombardy, Italy</div>
  </header>
  <div class="wk">Late August</div>
  <div id="list-aug"></div>
  <div class="wk">September</div>
  <div id="list-sep"></div>
  <footer>Made for Daniele</footer>
</div>
<script>
const plan = [
  ["2026-08-29","Rest + Friends + Board Games","rest"],
  ["2026-08-30","Lunch and Hiking","out"],
  ["2026-08-31","SPA","rest"],
  ["2026-09-01","Local Sightseeing + Bike","out"],
  ["2026-09-02","Milan","travel"],
  ["2026-09-03","Lake Como","travel"],
  ["2026-09-04","Dawn Hike","out"],
  ["2026-09-05","Rest","rest"],
  ["2026-09-06","Switzerland or Road Trip","travel"],
  ["2026-09-07","Teglio","out"],
  ["2026-09-08","Visit a winery","out"],
  ["2026-09-09","",""],
  ["2026-09-10","",""],
  ["2026-09-11","",""],
  ["2026-09-12","Back to HK","travel"],
];
const dow=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const mon=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const tagLabel={travel:"Travel",rest:"Rest",out:"Outdoors"};
function card([iso,act,kind]){
  const d=new Date(iso+"T00:00:00");
  const tag=kind?'<span class="tag t-'+kind+'">'+tagLabel[kind]+'</span>':'';
  const actHtml=act?'<div class="act">'+act+tag+'</div>':'<div class="act empty">Open — nothing planned yet</div>';
  return '<div class="card"><div class="date"><div class="dow">'+dow[d.getDay()]+'</div><div class="dnum">'+d.getDate()+'</div><div class="mon">'+mon[d.getMonth()]+'</div></div>'+actHtml+'</div>';
}
document.getElementById("list-aug").innerHTML=plan.filter(p=>p[0].startsWith("2026-08")).map(card).join("");
document.getElementById("list-sep").innerHTML=plan.filter(p=>p[0].startsWith("2026-09")).map(card).join("");
</script>
</body>
</html>
